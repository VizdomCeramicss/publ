<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product — Vizdom Ceramics</title>
<meta name="description" content="Vizdom Ceramics product details — photos, description and quick WhatsApp inquiry.">
<link rel="icon" href="images/logoo.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <nav class="nav container">
    <a href="index.html" class="brand">
      <img src="images/logo.png" alt="Vizdom Ceramics" class="brand-logo">
      <span class="brand-name sr-only">Vizdom Ceramics</span>
    </a>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="catalog.html">Full Catalog</a></li>
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
    <a class="nav-cta" href="#" data-wa-generic target="_blank" rel="noopener">Chat on WhatsApp</a>
    <button class="nav-toggle" onclick="toggleNav()" aria-label="Toggle menu">&#9776;</button>
  </nav>
</header>

<main>
  <section class="section container product-detail-section">
    <nav class="breadcrumb" id="breadcrumb"></nav>
    <div class="product-detail-grid" id="product-detail">
      <!-- Filled automatically by js/script.js based on ?id= in the URL.
           Nothing to edit here — add/edit products in js/products.js instead. -->
    </div>
  </section>

  <div class="arch-divider"><span></span><span></span><span></span></div>

  <section class="section container" id="related-section">
    <div class="section-head">
      <div>
        <p class="eyebrow">You may also like</p>
        <h2>More from this category</h2>
      </div>
      <a href="catalog.html" class="btn btn-outline">Browse full catalog</a>
    </div>
    <div class="product-grid reveal-grid" id="related-grid"></div>
  </section>
</main>

<footer class="site-footer">
  <div class="container footer-grid">
    <span>© <span id="year"></span> Vizdom Ceramics. All rights reserved.</span>
    <span><a href="index.html">Home</a> · <a href="catalog.html">Full Catalog</a> · <a href="index.html#contact">Contact</a></span>
  </div>
</footer>

<a href="#" data-wa-generic target="_blank" rel="noopener" class="wa-float" aria-label="Chat on WhatsApp">💬</a>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()" aria-label="Close">&times;</button>
  <div class="lightbox-inner">
    <img id="lightbox-img" src="" alt="Product photo">
    <div class="lightbox-controls">
      <button onclick="stepLightbox(-1)">&#8249; Prev</button>
      <span id="lightbox-title"></span>
      <button onclick="stepLightbox(1)">Next &#8250;</button>
    </div>
  </div>
</div>

<script src="js/whatsapp-config.js"></script>
<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/script.js"></script>
<script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
